<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agranova Authentication Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #22c55e;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #555;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background: #22c55e;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 10px;
      margin-top: 10px;
    }
    button:hover {
      background: #16a34a;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid transparent;
    }
    .result.success {
      background: #dcfce7;
      border-left-color: #22c55e;
      color: #166534;
    }
    .result.error {
      background: #fee2e2;
      border-left-color: #ef4444;
      color: #991b1b;
    }
    .result.info {
      background: #dbeafe;
      border-left-color: #3b82f6;
      color: #1e40af;
    }
    .result pre {
      background: #f3f4f6;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      max-height: 200px;
      overflow-y: auto;
    }
    .tests {
      margin-top: 30px;
    }
    .test-item {
      background: #f3f4f6;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .test-status {
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
    }
    .test-status.pending {
      background: #fef3c7;
      color: #92400e;
    }
    .test-status.passed {
      background: #dcfce7;
      color: #166534;
    }
    .test-status.failed {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌾 Agranova Authentication Test Suite</h1>
    
    <div id="apiInfo" style="background: #f0f9ff; padding: 10px; border-radius: 4px; margin-bottom: 20px;">
      <strong>API URL:</strong> <span id="apiUrl">Loading...</span>
    </div>

    <h2>Manual Testing</h2>
    
    <div>
      <h3>Login</h3>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="loginEmail" value="demo@agranova.com">
      </div>
      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="loginPassword" value="any-password">
      </div>
      <button onclick="testLogin()">Test Login</button>
      <div id="loginResult"></div>
    </div>

    <div>
      <h3>Register</h3>
      <div class="form-group">
        <label>Name:</label>
        <input type="text" id="registerName" value="Test User">
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="registerEmail" value="test@agranova.com">
      </div>
      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="registerPassword" value="test123456">
      </div>
      <button onclick="testRegister()">Test Register</button>
      <div id="registerResult"></div>
    </div>

    <div class="tests">
      <h2>Automated Tests</h2>
      <button onclick="runAllTests()" style="background: #3b82f6;">Run All Tests</button>
      <div id="testResults" style="margin-top: 20px;"></div>
    </div>
  </div>

  <script>
    const API_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:5001/api'
      : '/api';

    document.getElementById('apiUrl').textContent = API_URL;

    function showResult(elementId, message, type = 'info', data = null) {
      const element = document.getElementById(elementId);
      let content = `<div class="result ${type}">${message}`;
      if (data) {
        content += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      }
      content += '</div>';
      element.innerHTML = content;
    }

    async function testLogin() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showResult('loginResult', '❌ Please enter email and password', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
          showResult('loginResult', '✅ Login successful!', 'success', data.data);
        } else {
          showResult('loginResult', `❌ Login failed: ${data.message || 'Unknown error'}`, 'error', data);
        }
      } catch (error) {
        showResult('loginResult', `❌ Request failed: ${error.message}`, 'error');
      }
    }

    async function testRegister() {
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;

      if (!name || !email || !password) {
        showResult('registerResult', '❌ Please fill all fields', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
          showResult('registerResult', '✅ Registration successful!', 'success', data.data);
        } else {
          showResult('registerResult', `❌ Registration failed: ${data.message || 'Unknown error'}`, 'error', data);
        }
      } catch (error) {
        showResult('registerResult', `❌ Request failed: ${error.message}`, 'error');
      }
    }

    async function runAllTests() {
      const results = document.getElementById('testResults');
      results.innerHTML = '';

      const tests = [
        { name: 'Login with demo@agranova.com', fn: () => testEndpoint('POST', '/auth/login', { email: 'demo@agranova.com', password: 'test' }) },
        { name: 'Register new user', fn: () => testEndpoint('POST', '/auth/register', { name: 'Test', email: `user${Date.now()}@test.com`, password: 'test123456' }) },
        { name: 'Get devices', fn: () => testEndpoint('GET', '/devices') },
        { name: 'Get sensors latest', fn: () => testEndpoint('GET', '/sensors/latest') },
        { name: 'Get irrigation config', fn: () => testEndpoint('GET', '/irrigation/config') },
        { name: 'Get alerts', fn: () => testEndpoint('GET', '/alerts') },
        { name: 'Get community groups', fn: () => testEndpoint('GET', '/community/groups') },
      ];

      for (const test of tests) {
        const testDiv = document.createElement('div');
        testDiv.className = 'test-item';
        testDiv.innerHTML = `<span>${test.name}</span><span class="test-status pending">Testing...</span>`;
        results.appendChild(testDiv);
      }

      const testDivs = results.querySelectorAll('.test-item');
      
      for (let i = 0; i < tests.length; i++) {
        const status = testDivs[i].querySelector('.test-status');
        try {
          await tests[i].fn();
          status.className = 'test-status passed';
          status.textContent = '✅ PASSED';
        } catch (error) {
          status.className = 'test-status failed';
          status.textContent = `❌ FAILED`;
        }
        await new Promise(r => setTimeout(r, 300));
      }
    }

    async function testEndpoint(method, path, body = null) {
      const token = localStorage.getItem('token');
      const headers = {
        'Content-Type': 'application/json',
      };
      
      if (token) {
        headers.Authorization = `Bearer ${token}`;
      }

      const response = await fetch(`${API_URL}${path}`, {
        method,
        headers,
        ...(body && { body: JSON.stringify(body) })
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return await response.json();
    }

    // Check connectivity on load
    window.addEventListener('load', async () => {
      try {
        const response = await fetch(`${API_URL}/auth/me`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        console.log('✅ API is reachable:', API_URL);
      } catch (error) {
        console.error('❌ API is not reachable:', API_URL, error);
      }
    });
  </script>
</body>
</html>
